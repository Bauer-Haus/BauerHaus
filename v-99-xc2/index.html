<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Status</title> <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { background-color: #0a0a0a; color: #444; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #gatekeeper { margin-top: 100px; text-align: center; }
        #main-content { display: none; width: 100%; max-width: 900px; }
        .cam-container { margin-bottom: 30px; border: 1px solid #222; padding: 10px; background: #111; }
        h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: #666; }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <p>SECURE ACCESS REQUIRED</p>
    </div>

    <div id="main-content">
        <div class="cam-container">
            <h2>Live Feed 01 - Primary</h2>
            <video id="cam1" class="video-js vjs-default-skin vjs-16-9" controls autoplay preload="auto">
                <source src="https://s65.ipcamlive.com/streams/41cl5jquvyvinuxmo/stream.m3u8" type="application/x-mpegURL">
            </video>
        </div>

        <div id="extra-cams"></div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
    // 1. Get the input
    const input = prompt("Enter Credentials:");
    
    // 2. Clean the input: .trim() removes spaces, .toLowerCase() ignores Caps
    const accessCode = input ? input.trim().toLowerCase() : "";

    // 3. Check against your secret word (must be lowercase here)
    if (accessCode === "LiveCam") { 
        document.getElementById('gatekeeper').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
    } else {
        alert("Unauthorized Access.");
        // Only redirect if they actually typed something wrong (not just hitting cancel)
        if (input !== null) {
            window.location.href = "https://bauer-haus.github.io/BauerHaus/";
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Status</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { 
            background-color: #0a0a0a; 
            color: #e0e0e0; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        #gatekeeper { 
            margin-top: 100px; 
            text-align: center; 
            letter-spacing: 2px;
        }
        #main-content { 
            display: none; 
            width: 100%; 
            max-width: 1200px;
            /* Grid layout: fits 1 cam on mobile, 2+ on desktop */
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); 
            gap: 20px;
        }
        .cam-container { 
            border: 1px solid #2a2a2a; 
            padding: 10px; 
            background: #1a1a1a;
        }
        h2 { 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: #ffffff; 
            margin-bottom: 10px;
        }
        /* Make the video player responsive */
        .video-js { width: 100% !important; height: auto !important; aspect-ratio: 16/9; }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <p>SECURE ACCESS REQUIRED</p>
    </div>

    <div id="main-content">
        <div class="cam-container">
            <h2>Live Feed 01 - Newport Beach Pier</h2>
            <video id="cam1" class="video-js vjs-default-skin" controls autoplay preload="auto">
                <source src="https://s65.ipcamlive.com/streams/41cl5jquvyvinuxmo/stream.m3u8" type="application/x-mpegURL">
            </video>
        </div>

        <div class="cam-container">
    <h2>Live Feed 02 - Big Sky</h2>
    <div class="video-js-wrapper">
        <iframe 
            width="100%" 
            height="auto" 
            style="aspect-ratio: 16/9; border: none;"
            src="https://www.youtube.com/embed/dMr-Jt_K3Cc?autoplay=1&mute=1" 
            allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>
            
</div> <div class="cam-container">
    <h2>Live Feed 03 - Key West</h2>
    <video id="cam1" class="video-js vjs-default-skin" controls autoplay preload="auto">
        <source src="https://usw01-smr05-relay.ozolio.com/hls-live/_definst_/relay01.jflbdqs.fd0.sm1.av2.mt0.at0.as0.dv0.sh2.rt19793.rc0.edge.basic.stream/chunklist_w1943403610.m3u8" type="application/x-mpegURL">
    </video>
</div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        (function() {
            const input = prompt("Enter Credentials:");
            
            // Normalize: remove spaces and ignore case
            const accessCode = input ? input.trim().toLowerCase() : "";

            if (accessCode === "livecam") { 
                // Show the grid and hide the gatekeeper text
                document.getElementById('gatekeeper').style.display = 'none';
                document.getElementById('main-content').style.display = 'grid';
            } else {
                // Silently redirect if wrong or cancelled
                if (input !== null) {
                    window.location.href = "https://bauer-haus.github.io/BauerHaus/";
                }
            }
        })();
    </script>
</body>
</html>

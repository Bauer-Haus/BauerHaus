<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Cams</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { background-color: #0a0a0a; color: #e0e0e0; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #gatekeeper { margin-top: 100px; text-align: center; letter-spacing: 2px; }
        #main-content { display: none; width: 100%; max-width: 1400px; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; }
        .cam-container { border: 1px solid #2a2a2a; padding: 10px; background: #1a1a1a; }
        h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: #ffffff; margin-bottom: 10px; margin-top: 0; }
        .video-js, iframe { width: 100% !important; height: auto !important; aspect-ratio: 16/9; border: none; }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <p>SECURE ACCESS REQUIRED</p>
    </div>

    <div id="main-content"></div> <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        // --- 1. YOUR CAMERA LIST ---
        // Just add a new line here to add a camera!
        const myCameras = [
            { title: "Blackie's Bar Surf Cam 1", type: "iframe", url: "https://g1.ipcamlive.com/player/player.php?alias=blackiessurfcam2&autoplay=1" },
            { title: "Big Sky", type: "youtube", url: "dMr-Jt_K3Cc" },
            { title: "New Ozolio Cam", type: "iframe", url: "https://relay.ozolio.com/pub.api?cmd=embed&oid=EMB_RKNO000004F8&autoplay=1" }
        ];

        // --- 2. THE ENGINE ---
function loadDashboard() {
    const container = document.getElementById('main-content');
    
    myCameras.forEach((cam, index) => {
        const camDiv = document.createElement('div');
        camDiv.className = 'cam-container';
        
        let playerHtml = '';
        if (cam.type === "youtube") {
            playerHtml = `<iframe src="https://www.youtube.com/embed/${cam.url}?mute=1" allow="encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
        } else if (cam.type === "iframe") {
            playerHtml = `<iframe src="${cam.url}" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>`;
        } else {
            // HLS Video.js Engine
            playerHtml = `<video id="cam${index}" class="video-js vjs-default-skin" controls preload="auto"><source src="${cam.url}" type="application/x-mpegURL"></video>`;
        }

        camDiv.innerHTML = `<h2>Live Feed ${index + 1} - ${cam.title}</h2>${playerHtml}`;
        container.appendChild(camDiv);

        // --- ADD THIS TO WAKE UP VIDEO.JS ---
        if (cam.type === "hls") {
            videojs(`cam${index}`); 
        }
    });

    document.getElementById('gatekeeper').style.display = 'none';
    container.style.display = 'grid';
}
        // --- 3. THE GATEKEEPER ---
        (function() {
            const input = prompt("Enter Password:");
            const accessCode = input ? input.trim().toLowerCase() : "";

            if (accessCode === "livecam") {
                loadDashboard();
            } else if (input !== null) {
                window.location.href = "https://bauerhaus.io";
            }
        })();
    </script>
</body>
</html>
